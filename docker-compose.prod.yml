services:
  bcf-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bcf:${POSTGRES_PASSWORD}@postgres:5432/bcf_platform
      HOST: "0.0.0.0"
      PORT: "3000"
      RUST_LOG: "bcf_server=info,tower_http=info"
      STORAGE_PATH: /app/data/snapshots
    volumes:
      - snapshot_data:/app/data/snapshots
    networks:
      - bcf-net

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: bcf_platform
      POSTGRES_USER: bcf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcf -d bcf_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bcf-net

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bcf-server
    networks:
      - bcf-net

volumes:
  pgdata:
  snapshot_data:
  caddy_data:
  caddy_config:

networks:
  bcf-net:
    driver: bridge
