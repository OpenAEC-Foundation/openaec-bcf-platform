services:
  bcf-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bcf-server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bcf:${POSTGRES_PASSWORD}@bcf-postgresql:5432/bcf_platform
      HOST: "0.0.0.0"
      PORT: "3000"
      RUST_LOG: "bcf_server=info,tower_http=info"
      STORAGE_PATH: /app/data/snapshots
    volumes:
      - snapshot_data:/app/data/snapshots
    networks:
      - bcf-net
      - openaec_platform

  postgres:
    image: postgres:16-alpine
    container_name: bcf-postgresql
    restart: always
    environment:
      POSTGRES_DB: bcf_platform
      POSTGRES_USER: bcf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcf -d bcf_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bcf-net

volumes:
  pgdata:
  snapshot_data:

networks:
  bcf-net:
    driver: bridge
  openaec_platform:
    external: true
