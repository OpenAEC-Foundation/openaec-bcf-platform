services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: bcf_platform
      POSTGRES_USER: bcf
      POSTGRES_PASSWORD: bcf_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcf -d bcf_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
